services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    command: --sort_buffer_size=8M --max_allowed_packet=64M
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: survey_app
      MYSQL_USER: survey
      MYSQL_PASSWORD: survey_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  app-backend:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    command: sh -c "if [ ! -d node_modules/.bin ]; then npm ci --no-audit --no-fund; fi && npm run prisma:generate && npm run prisma:deploy && npm run seed && npm run start:dev"
    env_file:
      - .env
    environment:
      DATABASE_URL: "mysql://survey:survey_password@mysql:3306/survey_app"
      FRONTEND_ORIGIN: "http://localhost:5174"
      PORT: "3100"
    ports:
      - "3100:3100"
    volumes:
      - ./backend:/app
      - backend-node-modules:/app/node_modules
      - backend-uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

  app-frontend:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    command: sh -c "if [ ! -d node_modules/.bin ]; then npm ci --no-audit --no-fund; fi && npm run dev -- --host 0.0.0.0 --port 5174"
    environment:
      VITE_API_BASE: "http://localhost:3100/api"
    ports:
      - "5174:5174"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - app-backend

volumes:
  mysql-data:
  minio-data:
  backend-node-modules:
  frontend-node-modules:
  backend-uploads:
